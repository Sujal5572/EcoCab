spring:
  application:
    name: mobility-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/mobility
    username: ${DB_USER:postgres}         # FIX: was missing
    password: ${DB_PASSWORD:postgres}     # FIX: was missing
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 5000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect  # FIX: missing
    open-in-view: false                                          # FIX: missing
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
        default_batch_fetch_size: 50

  flyway:                           # FIX: entire section was missing
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:                          # FIX: was spring.redis (Boot 2.x). Must be spring.data.redis in Boot 3.x
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: demand-service-group
      auto-offset-reset: latest
      enable-auto-commit: false
      max-poll-records: 100
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.mobility.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    listener:
      concurrency: 3
      ack-mode: manual_immediate

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true



